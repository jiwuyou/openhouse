buildscript {
    repositories {
        mavenCentral()
        google()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.13.2"
    }
}

allprojects {
    repositories {
        maven { url uri("${rootDir}/../../vendor/maven") }
        google()
        mavenCentral()
        maven { url "https://maven.mozilla.org/maven2" }
        maven { url "https://jitpack.io" }
    }
}
